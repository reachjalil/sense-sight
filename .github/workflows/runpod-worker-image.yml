name: Build runpod-worker image

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "packages/runpod-worker/**"
      - ".github/workflows/runpod-worker-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/runpod-worker
    steps:
      - uses: actions/checkout@v4

      # The CUDA devel base image + torch + gsplat exceed the ~14GB free on a
      # stock ubuntu-latest runner; reclaim the large preinstalled toolchains
      # we don't use.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY" || true
          docker system prune -af || true
          df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/runpod-worker
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sense-sight-runpod-worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/sense-sight-runpod-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min
