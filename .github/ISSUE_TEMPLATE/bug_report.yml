name: Bug report
description: Report broken behavior in SenseSight.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: What is happening?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, URLs, screenshots, or logs when useful.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Node 22.12+, pnpm 10, browser/OS"
