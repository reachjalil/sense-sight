[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sense-sight-runpod-worker"
version = "0.1.0"
description = "RunPod serverless GPU worker: trains/refines Gaussian splat shards via gsplat and publishes the result to R2 or back inline."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "SenseSight" }]
keywords = ["gaussian-splatting", "gsplat", "runpod", "robotics", "3dgs"]
dependencies = [
    "runpod>=1.7.0",
    "gsplat>=1.4.0",
    "torch>=2.4.0",
    "tqdm>=4.66.0",
    "numpy>=2.0",
    "pillow>=11.0",
    "boto3>=1.34.0",
    "requests>=2.32.0",
]

[project.optional-dependencies]
test = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["src"]
