[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sense-sight-splat-io"
version = "0.1.0"
description = "Dependency-light reader/writer for the antimatter15/INRIA .splat Gaussian format (+ colored PLY) and an isotropic-scale estimator. numpy only."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "SenseSight" }]
keywords = ["gaussian-splatting", "splat", "ply", "point-cloud", "3dgs", "robotics"]
dependencies = ["numpy>=1.24"]

[project.optional-dependencies]
test = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["src"]
